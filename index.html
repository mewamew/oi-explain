<title>OI 题解合集</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #21263a;
    --border: #2e3347;
    --accent: #5b8af5;
    --accent2: #7c5cbf;
    --green: #4caf7d;
    --text: #d4d9f0;
    --text-dim: #7a82a8;
    --text-bright: #eef0fb;
    --radius: 10px;
  }

  body {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    padding: 24px 16px 80px;
  }

  .container { max-width: 860px; margin: 0 auto; }

  .page-header {
    background: linear-gradient(135deg, #1a2040 0%, #16203a 50%, #1a1840 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px 24px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(91,138,245,.18) 0%, transparent 70%);
  }
  .page-header .subtitle {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .page-header h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-bright);
    line-height: 1.3;
  }
  .page-header p {
    margin-top: 10px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 4px 14px;
  }

  .solution-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .solution-item a {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    transition: border-color .18s ease, transform .18s ease, background .18s ease;
  }
  .solution-item a:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(4px);
  }
  .solution-item .icon {
    flex-shrink: 0;
    width: 38px; height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-bright);
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  }
  .solution-item .meta { flex: 1; min-width: 0; }
  .solution-item .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-bright);
  }
  .solution-item .desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .solution-item .arrow {
    color: var(--text-dim);
    font-size: 18px;
    transition: color .18s ease;
  }
  .solution-item a:hover .arrow { color: var(--accent); }

  .footer {
    margin-top: 40px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }
</style>
</head>
